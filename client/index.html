    <!-- ─── Schema: FAQPage ─── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Precisa esvaziar a piscina para detectar o vazamento?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. O serviço é realizado com a piscina cheia. Usamos hidrofone digital subaquático, com o técnico dentro da água, que identifica o ponto exato do vazamento pelo som. Você não tem nenhum custo com esvaziamento, reenchimento ou reequilíbrio de produtos químicos."
          }
        },
        {
          "@type": "Question",
          "name": "Precisa quebrar a parede ou o piso para encontrar o vazamento?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não antes do diagnóstico. O geofone digital capta o som do vazamento através de concreto, cerâmica e alvenaria. Só após identificar o ponto exato é que qualquer abertura é necessária — e só naquele ponto específico, sem demolição desnecessária."
          }
        },
        {
          "@type": "Question",
          "name": "Como saber se tenho um vazamento oculto em casa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Os sinais mais comuns são: conta de água alta sem mudança de hábitos, mancha de umidade que volta depois de pintar, piso frio em um ponto específico, pressão da torneira caindo progressivamente ou o medidor de água girando com tudo fechado."
          }
        },
        {
          "@type": "Question",
          "name": "O que é geofone digital e como funciona na detecção de vazamentos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Geofone digital é um equipamento de escuta eletrônica de alta sensibilidade que capta vibrações acústicas produzidas pela água escapando sob pressão em tubulações embutidas. O técnico posiciona o sensor na superfície e o equipamento amplifica o som do vazamento, permitindo localizar o ponto exato sem abertura prévia."
          }
        },
        {
          "@type": "Question",
          "name": "O que é hidrofone e para que serve?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hidrofone é um microfone subaquático especializado para detecção de vazamentos em piscinas. Ele é inserido na água e capta o som do fluxo de água escapando pela tubulação de circulação, pelo ralo de fundo ou pela estrutura da piscina. Funciona com a piscina completamente cheia."
          }
        },
        {
          "@type": "Question",
          "name": "O que é câmera termográfica e quando é usada?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Câmera termográfica detecta variações de temperatura na superfície de paredes, pisos e lajes. Vazamentos causam diferença de temperatura que o infrared capta visualmente antes de qualquer mancha aparecer. É especialmente útil em imóveis onde o vazamento ainda não se manifestou na superfície."
          }
        },
        {
          "@type": "Question",
          "name": "O que é teste de estanqueidade?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Teste de estanqueidade é o procedimento em que a tubulação é pressurizada e monitorada durante um período. Se houver queda de pressão, confirma-se que existe perda no circuito. É indicado antes de reformas, obras novas, ou quando o medidor de água gira com todos os registros fechados."
          }
        },
        {
          "@type": "Question",
          "name": "O que é o laudo técnico de vazamento?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "É um documento formal emitido na mesma visita, com fotos do local, descrição técnica do problema, croqui de localização do ponto do vazamento e identificação do tipo de falha. O laudo é aceito por seguradoras e pode ser usado para contestar uma conta de água alta junto à concessionária."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto tempo demora o serviço de detecção de vazamento?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Em média de 1 a 3 horas, dependendo do tipo de vazamento e da extensão da área inspecionada. O laudo técnico é entregue na mesma visita e o orçamento para o reparo é apresentado no mesmo dia."
          }
        },
        {
          "@type": "Question",
          "name": "A Hidrodetect atende fora de Porto Velho?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Atendemos Porto Velho e região, incluindo municípios próximos. Entre em contato pelo WhatsApp para verificar disponibilidade para o seu endereço específico."
          }
        }
      ]
    }
